<div class="dashboard-container">
    <div class="dashboard-header">
        <h2>Dashboard</h2>
        <p>Welcome back! Here's your employee management overview.</p>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-card card-primary">
            <div class="card-icon">👥</div>
            <h5 class="card-title">Total Employees</h5>
            <div class="card-value">1,234</div>
            <p class="card-subtitle">+12 this month</p>
        </div>
        <div class="dashboard-card card-success">
            <div class="card-icon">✓</div>
            <h5 class="card-title">Present Today</h5>
            <div class="card-value">1,156</div>
            <p class="card-subtitle">93.7% attendance</p>
        </div>
        <div class="dashboard-card card-warning">
            <div class="card-icon">⏱</div>
            <h5 class="card-title">On Leave</h5>
            <div class="card-value">45</div>
            <p class="card-subtitle">Approved leaves</p>
        </div>
  
    </div>

    <div class="dashboard-table">
        <app-employee-table [employees]="employees"
        (editEmployee)="onEditEmployee($event)"
         (deleteEmployee)="onDeleteEmployee($event)"></app-employee-table>
    </div>

    <div class="employee-form">
        <app-employee-form 
        [employee]="selectedEmployee"></app-employee-form>
    </div>
   
</div>
